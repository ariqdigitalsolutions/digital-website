<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Order Starlink Package | AriQ Digital Solutions</title>
    <meta
      name="description"
      content="Place an AriQ Digital Solutions Starlink package order and send your details directly through WhatsApp."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html#home" aria-label="AriQ Digital Solutions home">
        <img src="ariq-logo-transparent.png" alt="AriQ Digital Solutions" />
      </a>
      <nav class="site-nav order-nav" aria-label="Order navigation">
        <a href="index.html#starlink-packages">Packages</a>
        <a href="index.html#contact">Contact</a>
      </nav>
      <a class="header-cta" href="index.html#starlink-packages">Back to Packages</a>
    </header>

    <main class="order-main">
      <section class="order-panel">
        <p class="eyebrow">Package Order</p>
        <h1>Place Your Order</h1>
        <p class="order-package" data-package-name>Selected Package</p>
        <form class="order-form" data-order-form>
          <label>Name<input type="text" name="name" autocomplete="given-name" placeholder="Name" required /></label>
          <label>Surname<input type="text" name="surname" autocomplete="family-name" placeholder="Surname" required /></label>
          <label>Address<input type="text" name="address" autocomplete="street-address" placeholder="Address" required /></label>
          <label>City<input type="text" name="city" autocomplete="address-level2" placeholder="City" required /></label>
          <label>
            Phone number
            <input
              type="tel"
              name="phone"
              autocomplete="tel"
              value="+263"
              maxlength="13"
              pattern="\+263[0-9]{9}"
              title="Phone number must start with +263 followed by 9 digits"
              required
            />
          </label>
          <label>Email address (optional)<input type="email" name="email" autocomplete="email" placeholder="you@example.com" /></label>
          <button class="button primary" type="submit">Place Order</button>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
